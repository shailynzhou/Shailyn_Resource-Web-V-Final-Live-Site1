<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Most popular Cafe places in Toronto</title>
  <link rel="stylesheet" href="https://use.typekit.net/ste3sdh.css">
  <link rel="stylesheet" href="Homepage.css">
</head>
<body>

  <!-- Dashboard -->
   <header class="dashboard">
  <div class="nav-left">
  <a href="About.html" class="about-link">About</a>
  </div>

  <div class="logo">The 6ix Study Cafe</div>
  <div class="nav-right"></div>
</header>

  <!-- Hero banner -->
  <section class="topbanner">
    <div class="banner">
      <div class="slides">
        <img src="Cafeforet.png" alt="Cafe banner 1">
        <img src="Ratelier_.png" alt="Cafe banner 2">
        <img src="Cafe x Bica2.png" alt="Cafe banner 3">
        <img src="Brandor coffee.jpg" alt="Cafe banner 4">
        <img src="PJ food&drink.jpg" alt="Cafe banner 5">
        <img src="10 dean.jpg" alt="Cafe banner 6">
      </div>

      <h1 class="maintitle">Most popular Cafe places in Toronto</h1>

      <button class="banner-arrow left" type="button" aria-label="Previous slide">
        &lt;
      </button>
      <button class="banner-arrow right" type="button" aria-label="Next slide">
        &gt;
      </button>
    </div>
  </section>

  <!-- Section title -->
  <section class="latest-header">
    <h2 class="title"><span class="italic">the</span> Most Visited</h2>
  </section>

  <!-- Cafe cards -->
  <section class="cafe-grid">
    <a href="cafeforet.html" class="cafe-card">
      <img src="cafeforet1.jpeg" alt="Cafe Foret">
      <span class="cafe-name">CAFE FORET</span>
    </a>

    <a href="Ratelier.html" class="cafe-card">
      <img src="ratelier2.jpeg" alt="Ratelier">
      <span class="cafe-name">RATELIER</span>
    </a>

    <a href="CafexBica.html" class="cafe-card">
      <img src="CafexBica3.jpeg" alt="Cafe x Bica">
      <span class="cafe-name">CAFE x BICA</span>
    </a>

    <a href="BrandorCoffee.html" class="cafe-card">
      <img src="Brandor4.jpeg" alt="Brandor Coffee">
      <span class="cafe-name">BRANDOR COFFEE</span>
    </a>

    <a href="ProjectSeoul.html" class="cafe-card">
      <img src="Project5.jpeg" alt="Project Seoul">
      <span class="cafe-name">PROJECT SEOUL</span>
    </a>

    <a href="10DEAN.html" class="cafe-card">
      <img src="10Dean6.jpeg" alt="10 Dean">
      <span class="cafe-name">10 DEAN</span>
    </a>
  </section>

</body>
</html>
